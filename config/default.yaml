profile:
  name: Default menu wiggle demo
  description: Default safe macro that exercises menu, D-pad, chord, analog, and trigger actions.
  risk_level: low

runtime:
  target_fps: 60
  max_jitter_ms: 4

safety:
  countdown_seconds: 3
  max_runtime_seconds: 30
  enable_console_stop: true
  stop_key: q
  require_enter: false

perception:
  screenshot:
    enabled: true
    backend: mss
    monitor_index: 1
    output_folder: logs/screenshots
    file_prefix: sample_frame
    region: null
    # Example region:
    # region:
    #   left: 0
    #   top: 0
    #   width: 1280
    #   height: 720

input:
  backend: vgamepad
  device: xbox360
  button_map:
    a: A
    b: B
    x: X
    y: Y
    up: DPAD_UP
    down: DPAD_DOWN
    left: DPAD_LEFT
    right: DPAD_RIGHT
    start: START
    back: BACK
    select: BACK
    lb: LEFT_SHOULDER
    rb: RIGHT_SHOULDER
    lt: LEFT_TRIGGER
    rt: RIGHT_TRIGGER
    ls: LEFT_THUMB
    rs: RIGHT_THUMB
    left_stick_up: LEFT_STICK_UP
    left_stick_down: LEFT_STICK_DOWN
    left_stick_left: LEFT_STICK_LEFT
    left_stick_right: LEFT_STICK_RIGHT
    right_stick_up: RIGHT_STICK_UP
    right_stick_down: RIGHT_STICK_DOWN
    right_stick_left: RIGHT_STICK_LEFT
    right_stick_right: RIGHT_STICK_RIGHT

logging:
  enabled: true
  folder: logs
  file_prefix: playback

playback:
  run: menu_wiggle_demo
  macros:
    menu_wiggle_demo:
      - action: start
        hold_seconds: 0.08
        note: open RetroArch/game menu
      - wait_seconds: 0.25
      - repeat: 2
        sequence:
          - action: down
            hold_seconds: 0.08
          - wait_seconds: 0.08
      - chord:
          - lb
          - rb
        hold_seconds: 0.10
        note: example two-button chord
      - action: back
        hold_seconds: 0.08
      - action: left_stick_right
        hold_seconds: 0.20
      - action: rt
        hold_seconds: 0.10

    legacy_demo:
      - action: a
        hold_seconds: 0.08
      - action: right
        hold_seconds: 0.10
      - action: b
        hold_seconds: 0.08
      - action: left
        hold_seconds: 0.10
      - action: y
        hold_seconds: 0.08

  # Legacy Stage 2 format is still supported.
  # If 'run' is removed, this direct sequence will be used.
  sequence:
    - action: a
      hold_seconds: 0.08
