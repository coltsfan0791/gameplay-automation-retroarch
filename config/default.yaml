runtime:
  target_fps: 60
  max_jitter_ms: 4

input:
  backend: vgamepad
  device: xbox360
  button_map:
    a: A
    b: B
    x: X
    y: Y
    up: DPAD_UP
    down: DPAD_DOWN
    left: DPAD_LEFT
    right: DPAD_RIGHT

logging:
  enabled: true
  folder: logs
  file_prefix: playback

playback:
  sequence:
    - action: b
      hold_seconds: 0.08
    - action: right
      hold_seconds: 0.10
    - action: b
      hold_seconds: 0.08
    - action: left
      hold_seconds: 0.10
    - action: y
      hold_seconds: 0.08
