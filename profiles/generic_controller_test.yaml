profile:
  name: Generic controller test
  description: Exercises face buttons, D-pad, shoulders, triggers, waits, and a simple chord.
  risk_level: low

runtime:
  target_fps: 60
  max_jitter_ms: 4

safety:
  countdown_seconds: 3
  max_runtime_seconds: 30
  enable_console_stop: true
  stop_key: q
  require_enter: false

logging:
  enabled: true
  folder: logs
  file_prefix: generic_controller_test

playback:
  run: generic_controller_test
  macros:
    generic_controller_test:
      - action: a
        hold_seconds: 0.08
      - wait_seconds: 0.08
      - action: b
        hold_seconds: 0.08
      - wait_seconds: 0.08
      - action: x
        hold_seconds: 0.08
      - wait_seconds: 0.08
      - action: y
        hold_seconds: 0.08
      - wait_seconds: 0.08
      - repeat: 1
        sequence:
          - action: up
            hold_seconds: 0.08
          - action: right
            hold_seconds: 0.08
          - action: down
            hold_seconds: 0.08
          - action: left
            hold_seconds: 0.08
      - chord:
          - lb
          - rb
        hold_seconds: 0.10
      - wait_seconds: 0.10
      - action: lt
        hold_seconds: 0.10
      - action: rt
        hold_seconds: 0.10
