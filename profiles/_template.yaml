runtime:
  target_fps: 60
  max_jitter_ms: 4

logging:
  enabled: true
  folder: logs
  file_prefix: replace_with_profile_name

playback:
  run: replace_with_macro_name
  macros:
    replace_with_macro_name:
      - action: start
        hold_seconds: 0.08
      - wait_seconds: 0.25
      - repeat: 2
        sequence:
          - action: down
            hold_seconds: 0.08
          - wait_seconds: 0.08
      - chord:
          - lb
          - rb
        hold_seconds: 0.10

  # Optional fallback if 'run' is removed.
  sequence:
    - action: a
      hold_seconds: 0.08
