profile:
  name: Replace with profile name
  description: Replace with a short description of what this profile does.
  risk_level: low

runtime:
  target_fps: 60
  max_jitter_ms: 4

safety:
  countdown_seconds: 3
  max_runtime_seconds: 30
  enable_console_stop: true
  stop_key: q
  require_enter: false

perception:
  screenshot:
    enabled: true
    backend: mss
    monitor_index: 1
    output_folder: logs/screenshots
    file_prefix: replace_with_profile_name
    region: null

# Named screen regions (Phase 9).
# Uncomment and adjust to match your monitor and emulator window.
# regions:
#   full_screen:
#     left: 0
#     top: 0
#     width: 1366
#     height: 768
#   menu_area:
#     left: 200
#     top: 100
#     width: 966
#     height: 568

logging:
  enabled: true
  folder: logs
  file_prefix: replace_with_profile_name

playback:
  run: replace_with_macro_name
  macros:
    replace_with_macro_name:
      - action: start
        hold_seconds: 0.08
      - wait_seconds: 0.25
      - repeat: 2
        sequence:
          - action: down
            hold_seconds: 0.08
          - wait_seconds: 0.08
      - chord:
          - lb
          - rb
        hold_seconds: 0.10

  # Optional fallback if 'run' is removed.
  sequence:
    - action: a
      hold_seconds: 0.08
