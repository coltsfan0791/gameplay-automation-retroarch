runtime:
  target_fps: 60
  max_jitter_ms: 4

logging:
  enabled: true
  folder: logs
  file_prefix: retroarch_menu_test

playback:
  run: retroarch_menu_test
  macros:
    open_menu:
      - action: start
        hold_seconds: 0.08
      - wait_seconds: 0.30

    close_or_back_out:
      - repeat: 2
        sequence:
          - action: back
            hold_seconds: 0.08
          - wait_seconds: 0.15

    menu_wiggle:
      - repeat: 2
        sequence:
          - action: down
            hold_seconds: 0.08
          - wait_seconds: 0.08
      - repeat: 2
        sequence:
          - action: up
            hold_seconds: 0.08
          - wait_seconds: 0.08
      - chord:
          - lb
          - rb
        hold_seconds: 0.10
      - wait_seconds: 0.20

    retroarch_menu_test:
      - use_macro: open_menu
      - use_macro: menu_wiggle
      - use_macro: close_or_back_out
